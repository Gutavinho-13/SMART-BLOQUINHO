<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Lista de Tarefas</title>
  <link rel="stylesheet" href="index.css">
</head>
<body>

<div class="container">
  <h2>Smart Bloquinho</h2>

  <div class="input-area">
    <input type="text" id="taskInput" placeholder="Digite uma tarefa...">
    <button onclick="addTask()">Adicionar</button>
  </div>

  <div class="bulk-actions">
    <button onclick="markSelected()">Concluir selecionadas</button>
    <button onclick="deleteSelected()">Excluir selecionadas</button>
  </div>

  <ul id="taskList"></ul>
</div>

<script>
  let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

  function saveTasks() {
    localStorage.setItem("tasks", JSON.stringify(tasks));
  }

  function renderTasks() {
    const list = document.getElementById("taskList");
    list.innerHTML = "";

    tasks.forEach((task, index) => {
      const li = document.createElement("li");

      // Checkbox
      const checkbox = document.createElement("input");
      checkbox.type = "checkbox";
      checkbox.checked = task.selected || false;
      checkbox.onchange = () => {
        task.selected = checkbox.checked;
        saveTasks();
      };

      // Texto
      const span = document.createElement("span");
      span.textContent = task.text;
      if (task.done) span.classList.add("done");
      span.onclick = () => toggleTask(index);

      // Ações
      const actions = document.createElement("div");
      actions.classList.add("actions");

      const editBtn = document.createElement("button");
      editBtn.textContent = "Editar";
      editBtn.onclick = () => editTask(index);

      const deleteBtn = document.createElement("button");
      deleteBtn.textContent = "Excluir";
      deleteBtn.onclick = () => deleteTask(index);

      actions.appendChild(editBtn);
      actions.appendChild(deleteBtn);

      li.appendChild(checkbox);
      li.appendChild(span);
      li.appendChild(actions);

      list.appendChild(li);
    });
  }

  function addTask() {
    const input = document.getElementById("taskInput");
    if (input.value.trim() === "") return;

    tasks.push({ text: input.value, done: false, selected: false });
    input.value = "";
    saveTasks();
    renderTasks();
  }

  function toggleTask(index) {
    tasks[index].done = !tasks[index].done;
    saveTasks();
    renderTasks();
  }

  function deleteTask(index) {
    tasks.splice(index, 1);
    saveTasks();
    renderTasks();
  }

  function editTask(index) {
    const newText = prompt("Editar tarefa:", tasks[index].text);
    if (newText !== null && newText.trim() !== "") {
      tasks[index].text = newText;
      saveTasks();
      renderTasks();
    }
  }

  function markSelected() {
    tasks.forEach(task => {
      if (task.selected) task.done = true;
    });
    saveTasks();
    renderTasks();
  }

  function deleteSelected() {
    tasks = tasks.filter(task => !task.selected);
    saveTasks();
    renderTasks();
  }

  // Inicializar
  renderTasks();
</script>

</body>
</html>
